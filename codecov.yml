coverage:
  status:
    project:
      default:
        target: 95%
        threshold: 1%
    patch:
      default:
        target: 95%
        threshold: 1%

  ignore:
    - 'dist/'
    - 'docs/'
    - 'node_modules/'
    - 'coverage/'
    - '*.config.*'
    - 'test/'
    - '**/*.spec.ts'
    - '**/*.test.ts'
    - '**/*.d.ts'

comment:
  # Sections rendered in the bot comment, in order.
  # - reach:      sunburst diagram of coverage impact
  # - diff:       line-by-line coverage diff for files touched by the PR
  # - flags:      per-flag breakdown (if flags are configured)
  # - files:      file-level coverage table
  # - footer:     link back to the Codecov report
  layout: 'reach, diff, flags, files, footer'

  # `default` = post a new comment on the first relevant push and edit
  # it in place on subsequent pushes. No comment spam.
  behavior: default

  # Always post the comment, even when coverage percentage is unchanged.
  # Ensures reviewers always have a direct link to the Codecov report.
  require_changes: false

  # Post even when the base/head lack coverage data (e.g. first CI run
  # on a new PR where base hasn't been measured yet).
  require_base: false
  require_head: false

  # Show the bot comment on PRs only, not on direct pushes to main.
  show_carryforward_flags: false

github_checks:
  annotations: true

parsers:
  javascript:
    enable_partials: yes
